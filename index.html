<!doctype html>
<html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Minha Aprovação</title><style>
:root{--b:#2563eb;--d:#0f172a;--m:#64748b;--l:#e2e8f0;--bg:#f6f8fc;--r:#dc2626;--g:#059669}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:#1e293b;font-family:Inter,system-ui,-apple-system,"Segoe UI",sans-serif}button,input,textarea,select{font:inherit}button{cursor:pointer}.w{width:min(1180px,calc(100% - 24px));margin:auto}.top{position:sticky;top:0;z-index:20;background:#fffffff2;border-bottom:1px solid var(--l);backdrop-filter:blur(12px)}.topin{min-height:66px;display:flex;align-items:center;justify-content:space-between;gap:10px}.brand{display:flex;align-items:center;gap:10px}.logo{width:42px;height:42px;border-radius:13px;background:linear-gradient(135deg,#2563eb,#4338ca);color:#fff;display:grid;place-items:center;font-weight:900}.brand b,.brand small{display:block}.brand small{color:#94a3b8}.btn{border:0;border-radius:10px;padding:10px 12px;font-weight:800;background:var(--b);color:#fff}.gray{background:#e2e8f0;color:#334155}.red{background:#fee2e2;color:#b91c1c}.green{background:#d1fae5;color:#047857}.hero{padding:34px 0 27px;background:linear-gradient(125deg,#fff 55%,#eff6ff);border-bottom:1px solid var(--l)}h1{font-size:clamp(30px,5vw,46px);letter-spacing:-1.4px;margin:4px 0}.hero p{margin:0;color:var(--m)}.ey{font-size:12px;color:var(--b);font-weight:900;text-transform:uppercase}.main{padding:28px 0 70px}.bar{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:18px}.bar h2{margin:0}.actions,.tabs{display:flex;gap:7px;flex-wrap:wrap}.grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:15px}.card{border:1px solid var(--l);border-radius:16px;background:#fff;padding:19px;text-align:left;min-height:150px;box-shadow:0 3px 12px #0f172a08}.card h3{margin:17px 0 5px}.card p{margin:0;color:var(--m);font-size:13px}.icon{width:44px;height:44px;border-radius:13px;background:#eff6ff;color:#1d4ed8;display:grid;place-items:center;font-weight:900}.row,.item{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;border:1px solid var(--l);border-radius:12px;background:#fff;padding:12px 13px;margin:8px 0}.tiny{border:0;border-radius:8px;padding:7px 9px;background:#f1f5f9;color:#475569;font-weight:750}.modalbg{position:fixed;inset:0;z-index:50;background:#020617a8;display:grid;place-items:center;padding:12px}.modal{width:min(980px,100%);max-height:94vh;overflow:auto;background:#fff;border-radius:18px;padding:20px}.mtop{display:flex;justify-content:space-between;gap:10px}.mtop h2{margin:0}.close{border:0;width:36px;height:36px;border-radius:9px;background:#f1f5f9;font-size:21px}.field{margin:13px 0}.field label{display:block;font-size:13px;font-weight:800;margin-bottom:5px}.field input,.field textarea,.field select{width:100%;border:1px solid var(--l);border-radius:9px;padding:10px}.field textarea{min-height:90px}.split{display:grid;grid-template-columns:1fr 1fr;gap:10px}.notice{padding:12px;border-radius:10px;background:#eff6ff;color:#1e40af;font-size:13px}.repo{border-top:1px solid var(--l);margin-top:17px;padding-top:13px}.alt{display:grid;grid-template-columns:1fr auto auto;gap:7px;margin:7px 0}.question{border:1px solid var(--l);border-radius:12px;padding:15px;margin:11px 0}.option{display:block;padding:8px}.nums{display:flex;gap:5px;flex-wrap:wrap;margin:10px 0}.num{width:34px;height:34px;border:0;border-radius:8px;background:#e2e8f0}.num.on{outline:2px solid var(--b)}.num.done{background:#bfdbfe}.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.kpi{padding:15px;border:1px solid var(--l);border-radius:12px;background:#fff}.kpi b{display:block;font-size:24px}.chartrow{display:grid;grid-template-columns:180px 1fr 45px;gap:8px;align-items:center;margin:9px 0}.chartbar{height:17px;background:#e2e8f0;border-radius:99px;overflow:hidden}.chartbar i{display:block;height:100%;background:#dc2626}.ok i{background:#059669}.correct{background:#dcfce7}.wrong{background:#fee2e2}.blank{background:#fef3c7}.examhead{text-align:center;border-bottom:2px solid #111}.progress{height:7px;background:#e2e8f0;border-radius:99px;overflow:hidden;margin-top:13px}.progress i{display:block;height:100%;background:#10b981}@media(max-width:760px){.grid{grid-template-columns:repeat(2,1fr)}.kpis{grid-template-columns:repeat(2,1fr)}.topin{align-items:flex-start;padding:10px 0}.topin>.actions{justify-content:flex-end}}@media(max-width:520px){.grid,.split{grid-template-columns:1fr}.row,.item{grid-template-columns:1fr}.bar{align-items:flex-start;flex-direction:column}.brand small{display:none}.topin{flex-direction:column}.topin>.actions{width:100%}.topin>.actions .btn{flex:1}.alt{grid-template-columns:1fr auto}.chartrow{grid-template-columns:100px 1fr 42px}}@media print{.top,.hero,.no-print,.mtop{display:none!important}.modalbg{position:static;background:#fff;padding:0;display:block}.modal{max-height:none;width:100%;overflow:visible;padding:0}.question{break-inside:avoid;border:0;border-bottom:1px solid #999}.pagebreak{page-break-before:always}}
</style></head><body><div id="app"><header class="top"><div class="w topin"><div class="brand"><div class="logo">A</div><div><b>Minha Aprovação</b><small>Portal responsivo</small></div></div><div class="actions"><button class="btn green" onclick="exportIndex()">Baixar INDEX atualizado</button></div></div></header><section class="hero"><div class="w"><div class="ey">Portal de estudos</div><h1>Concursos</h1><p>Crie, remova e compartilhe seus módulos.</p></div></section><main class="w main"><div class="bar"><h2>Meus concursos</h2><button class="btn" onclick="addContest()">＋ Concurso</button></div><div class="grid"><div class="card"><div class="icon">IF</div><h3>IFRJ</h3><p>1 disciplinas</p><div class="actions" style="margin-top:14px"><button class="btn" onclick="nav.ci=0;go('contest')">Abrir</button><button class="btn red" onclick="removeContest(0)">Remover</button></div></div><button class="card" onclick="addContest()"><div class="icon">＋</div><h3>Criar concurso</h3></button></div></main></div><div id="overlay"></div><script>
const SEED={"contests":[{"id":"mrxym4ndmcpi","name":"IFRJ","disciplines":[{"id":"mrxymbfpuv2i","name":"Teste","topics":[{"id":"mrxymfotp3lu","name":"Teste1","subtopics":[],"done":false}]}]}],"links":{"mrxym4ndmcpi:mrxymbfpuv2i:mrxymfotp3lu:video":[{"name":"Karol","url":"http://youtube.com/professornoslen"}],"mrxym4ndmcpi:mrxymbfpuv2i:mrxymfotp3lu:materials":[{"name":"Teste","url":"https://drive.google.com/drive/my-drive?hl=pt-br"}]},"questions":{},"attempts":[]},KEY='portal-compartilhado-1784839071135';let db;try{db=JSON.parse(localStorage.getItem(KEY))||structuredClone(SEED)}catch(e){db=JSON.parse(JSON.stringify(SEED))}db.links=db.links||{};db.questions=db.questions||{};db.attempts=db.attempts||[];let nav={p:'home',ci:0,di:0,ti:0};function save(){try{localStorage.setItem(KEY,JSON.stringify(db))}catch(e){}}function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}function esc(x){return String(x||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}function C(){return db.contests[nav.ci]}function D(){return C().disciplines[nav.di]}function T(){return D().topics[nav.ti]}function k(a){return [C().id,D()?.id||'all',T()?.id||'all',a].join(':')}function A(a){return db.links[k(a)]||[]}function Q(a){return db.questions[k(a)]||[]}function putLink(a,x){db.links[k(a)]=x;save()}function putQ(a,x){db.questions[k(a)]=x;save()}function header(back){return `<header class="top"><div class="w topin"><div class="brand"><div class="logo">A</div><div><b>Minha Aprovação</b><small>Portal responsivo</small></div></div><div class="actions"><button class="btn green" onclick="exportIndex()">Baixar INDEX atualizado</button>${back?`<button class="btn gray" onclick="go('${back}')">← Voltar</button>`:''}</div></div></header>`}function hero(t,s,b){return header(b)+`<section class="hero"><div class="w"><div class="ey">Portal de estudos</div><h1>${esc(t)}</h1><p>${esc(s)}</p></div></section>`}function render(){save();document.getElementById('app').innerHTML=nav.p==='home'?home():nav.p==='contest'?contest():nav.p==='disc'?disc():topic()}function go(p){nav.p=p;render();scrollTo(0,0)}
function home(){return hero('Concursos','Crie, remova e compartilhe seus módulos.','')+`<main class="w main"><div class="bar"><h2>Meus concursos</h2><button class="btn" onclick="addContest()">＋ Concurso</button></div><div class="grid">${db.contests.map((c,i)=>`<div class="card"><div class="icon">${esc(c.name.slice(0,2).toUpperCase())}</div><h3>${esc(c.name)}</h3><p>${c.disciplines.length} disciplinas</p><div class="actions" style="margin-top:14px"><button class="btn" onclick="nav.ci=${i};go('contest')">Abrir</button><button class="btn red" onclick="removeContest(${i})">Remover</button></div></div>`).join('')}<button class="card" onclick="addContest()"><div class="icon">＋</div><h3>Criar concurso</h3></button></div></main>`}
function contest(){let c=C();return hero(c.name,'Disciplinas, links, questões e simulados.','home')+`<main class="w main"><div class="bar"><h2>Disciplinas</h2><div class="actions"><button class="btn gray" onclick="dashboard()">Desempenho</button><button class="btn gray" onclick="simulator()">Simulado</button><button class="btn" onclick="addDisc()">＋ Disciplina</button></div></div><div class="grid">${c.disciplines.map((d,i)=>`<div class="card"><div class="icon">${esc(d.name.slice(0,2).toUpperCase())}</div><h3>${esc(d.name)}</h3><p>${d.topics.length} matérias</p><div class="progress"><i style="width:${pct(d)}%"></i></div><div class="actions" style="margin-top:14px"><button class="btn" onclick="nav.di=${i};go('disc')">Abrir</button><button class="tiny" onclick="move(c.disciplines,${i},-1)">↑</button><button class="tiny" onclick="move(c.disciplines,${i},1)">↓</button><button class="btn red" onclick="removeDisc(${i})">Apagar</button></div></div>`).join('')}<button class="card" onclick="links('Provas anteriores','proofs')"><div class="icon">PA</div><h3>Provas anteriores</h3><p>Links para PDFs no Drive, OneDrive ou web</p></button></div></main>`}
function disc(){let d=D();return hero(d.name,'Matérias específicas do conteúdo programático.','contest')+`<main class="w main"><div class="bar"><h2>Matérias específicas</h2><button class="btn" onclick="addTopic()">＋ Matéria</button></div>${d.topics.map((t,i)=>`<div class="row"><strong onclick="nav.ti=${i};go('topic')">${esc(t.name)} ›</strong><div class="actions"><label class="tiny"><input type="checkbox" ${t.done?'checked':''} onchange="tDone(${i},this.checked)"> Concluída</label><button class="tiny" onclick="move(d.topics,${i},-1)">↑</button><button class="tiny" onclick="move(d.topics,${i},1)">↓</button><button class="btn red" onclick="removeTopic(${i})">Apagar</button></div></div>`).join('')}</main>`}
function topic(){let t=T();return hero(t.name,D().name,'disc')+`<main class="w main">${t.subtopics?.length?`<div class="notice"><b>Conteúdo detalhado</b><ul>${t.subtopics.map(x=>`<li>${esc(x)}</li>`).join('')}</ul></div>`:''}<div class="grid" style="margin-top:16px">${[['▶','Vídeo Aulas','video'],['▣','Materiais Didáticos','materials'],['☷','Listas de exercícios','lists'],['✓','Exercícios Gerais','general'],['◎','Exercícios da Banca','board']].map(x=>`<button class="card" onclick="openArea('${x[2]}','${x[1]}')"><div class="icon">${x[0]}</div><h3>${x[1]}</h3><p>Abrir e gerenciar</p></button>`).join('')}</div></main>`}
function ask(t,v=''){let x=prompt(t,v);return x&&x.trim()?x.trim():null}function confirmDel(fn){if(prompt('Para confirmar, digite apagar')==='apagar')fn()}function addContest(){let n=ask('Nome do concurso:');if(n){db.contests.push({id:uid(),name:n,disciplines:[]});render()}}function addDisc(){let n=ask('Nome da disciplina:');if(n){C().disciplines.push({id:uid(),name:n,topics:[]});render()}}function addTopic(){let n=ask('Nome da matéria:');if(n){D().topics.push({id:uid(),name:n,subtopics:[],done:false});render()}}function removeContest(i){confirmDel(()=>{db.contests.splice(i,1);render()})}function removeDisc(i){confirmDel(()=>{C().disciplines.splice(i,1);render()})}function removeTopic(i){confirmDel(()=>{D().topics.splice(i,1);render()})}function move(a,i,d){let j=i+d;if(j<0||j>=a.length)return;[a[i],a[j]]=[a[j],a[i]];render()}function tDone(i,v){D().topics[i].done=v;render()}function pct(d){return d.topics.length?Math.round(d.topics.filter(x=>x.done).length/d.topics.length*100):0}
function modal(t,b){document.getElementById('overlay').innerHTML=`<div class="modalbg" onclick="if(event.target===this)closeM()"><div class="modal"><div class="mtop"><h2>${esc(t)}</h2><button class="close" onclick="closeM()">×</button></div>${b}</div></div>`}function closeM(){document.getElementById('overlay').innerHTML=''}function openArea(a,t){if(a==='general'||a==='board')qHome(a,t);else links(t,a)}function links(t,a){let x=A(a);modal(t,`<div class="split"><div class="field"><label>Nome</label><input id="ln"></div><div class="field"><label>Link</label><input id="lu" placeholder="https://..."></div></div><button class="btn" onclick="addLink('${a}','${esc(t)}')">Adicionar link</button><div class="repo">${x.map((o,i)=>`<div class="item"><a href="${esc(o.url)}" target="_blank" rel="noopener">${esc(o.name)} ↗</a><button class="btn red" onclick="delLink('${a}',${i},'${esc(t)}')">Apagar</button></div>`).join('')||'Nenhum link cadastrado.'}</div>`)}function addLink(a,t){let n=document.getElementById('ln').value.trim(),u=document.getElementById('lu').value.trim();if(!n||!/^https?:\/\//i.test(u))return alert('Informe nome e link válido.');let x=A(a);x.push({name:n,url:u});putLink(a,x);links(t,a)}function delLink(a,i,t){confirmDel(()=>{let x=A(a);x.splice(i,1);putLink(a,x);links(t,a)})}
function qHome(a,t){modal(t,`<div class="tabs"><button class="btn" onclick="qForm('${a}',-1)">＋ Adicionar</button><button class="btn gray" onclick="startSolve('${a}')">Resolver</button><button class="btn gray" onclick="qList('${a}')">Todas (${Q(a).length})</button></div>`)}function qForm(a,i){let q=i>=0?Q(a)[i]:{text:'',alts:['',''],correct:0};modal(i>=0?'Editar questão':'Adicionar questão',`<div class="field"><label>Enunciado</label><textarea id="qt">${esc(q.text)}</textarea></div><div class="field"><label>Link de imagem opcional</label><input id="qimg" value="${esc(q.image||'')}" placeholder="https://..."></div><div id="alts">${q.alts.map((x,j)=>alt(x,j,q.correct)).join('')}</div><button class="btn gray" onclick="addAlt()">＋ Alternativa</button> <button class="btn" onclick="saveQuestion('${a}',${i})">Salvar e adicionar outra</button>`)}function alt(x,i,c){return `<div class="alt"><input class="av" value="${esc(x)}"><label class="tiny"><input type="radio" name="cor" value="${i}" ${i===c?'checked':''}> Gabarito</label><button class="tiny" onclick="this.parentElement.remove()">×</button></div>`}function addAlt(){let n=document.querySelectorAll('.av').length;document.getElementById('alts').insertAdjacentHTML('beforeend',alt('',n,-1))}function saveQuestion(a,i){let text=document.getElementById('qt').value.trim(),image=document.getElementById('qimg').value.trim(),alts=[...document.querySelectorAll('.av')].map(x=>x.value.trim()).filter(Boolean),co=document.querySelector('input[name=cor]:checked');if(!text||alts.length<2||!co)return alert('Preencha enunciado, alternativas e gabarito.');let x=Q(a),old=i>=0?x[i]:{};let q={id:old.id||uid(),text,image,alts,correct:Math.min(+co.value,alts.length-1),stats:old.stats||{ok:0,wrong:0,blank:0}};if(i>=0)x[i]=q;else x.push(q);putQ(a,x);qForm(a,-1)}function qList(a){modal('Todas as questões',Q(a).map((q,i)=>`<div class="item"><span>${i+1}. ${esc(q.text.slice(0,100))}</span><div class="actions"><button class="tiny" onclick="qForm('${a}',${i})">Editar</button><button class="btn red" onclick="delQ('${a}',${i})">Apagar</button></div></div>`).join('')||'Nenhuma questão.')}function delQ(a,i){confirmDel(()=>{let x=Q(a);x.splice(i,1);putQ(a,x);qList(a)})}
let ex={qs:[],pos:0,ans:[],source:null};function startSolve(a){let x=Q(a);if(!x.length)return alert('Nenhuma questão.');ex={qs:x,pos:0,ans:Array(x.length).fill(null),source:a};showEx()}function showEx(){let q=ex.qs[ex.pos];modal('Resolver questões',`<div class="nums">${ex.qs.map((_,i)=>`<button class="num ${ex.ans[i]!==null?'done':''} ${i===ex.pos?'on':''}" onclick="saveAns();ex.pos=${i};showEx()">${i+1}</button>`).join('')}</div><div class="question"><b>${ex.pos+1}. ${esc(q.text)}</b>${q.image?`<img src="${esc(q.image)}" style="max-width:100%;display:block;margin:10px 0">`:''}${q.alts.map((x,i)=>`<label class="option"><input type="radio" name="ans" value="${i}" ${ex.ans[ex.pos]===i?'checked':''}> ${esc(x)}</label>`).join('')}</div><div class="actions"><button class="btn gray" onclick="saveAns();ex.pos=Math.max(0,ex.pos-1);showEx()">Anterior</button><button class="btn red" onclick="saveAns();finishEx()">Finalizar</button><button class="btn" onclick="saveAns();ex.pos=Math.min(ex.qs.length-1,ex.pos+1);showEx()">Próxima</button></div>`)}function saveAns(){let x=document.querySelector('input[name=ans]:checked');if(x)ex.ans[ex.pos]=+x.value}function finishEx(){let ok=0,wr=0,bl=0;ex.qs.forEach((q,i)=>{if(ex.ans[i]===null){bl++;q.stats.blank++}else if(ex.ans[i]===q.correct){ok++;q.stats.ok++}else{wr++;q.stats.wrong++}});if(ex.source)putQ(ex.source,ex.qs);db.attempts.push({date:new Date().toISOString(),ok,wrong:wr,blank:bl});save();modal('Resultado',`<div class="kpis"><div class="kpi"><b>${ok}</b>Acertos</div><div class="kpi"><b>${wr}</b>Erros</div><div class="kpi"><b>${bl}</b>Brancas</div><div class="kpi"><b>${Math.round(ok/ex.qs.length*100)}%</b>Aproveitamento</div></div>${ex.qs.map((q,i)=>`<div class="question ${ex.ans[i]===null?'blank':ex.ans[i]===q.correct?'correct':'wrong'}"><b>${esc(q.text)}</b><p>Sua resposta: ${ex.ans[i]===null?'Em branco':esc(q.alts[ex.ans[i]])}<br>Gabarito: ${esc(q.alts[q.correct])}</p></div>`).join('')}`)}
function allQ(){let out=[];C().disciplines.forEach(d=>d.topics.forEach(t=>['general','board'].forEach(a=>{let kk=[C().id,d.id,t.id,a].join(':'),x=db.questions[kk]||[];x.forEach(q=>out.push({q,d,t,a}))})));return out}function dashboard(){let all=allQ(),groups={};all.forEach(x=>{let g=groups[x.d.name]||(groups[x.d.name]={ok:0,wrong:0});g.ok+=x.q.stats.ok||0;g.wrong+=x.q.stats.wrong||0});let ok=all.reduce((s,x)=>s+(x.q.stats.ok||0),0),wr=all.reduce((s,x)=>s+(x.q.stats.wrong||0),0);modal('Desempenho',`<div class="kpis"><div class="kpi"><b>${all.length}</b>Questões</div><div class="kpi"><b>${ok}</b>Acertos</div><div class="kpi"><b>${wr}</b>Erros</div><div class="kpi"><b>${ok+wr?Math.round(ok/(ok+wr)*100):0}%</b>Aproveitamento</div></div><h3>Por disciplina</h3>${Object.entries(groups).map(([n,g])=>{let p=g.ok+g.wrong?Math.round(g.ok/(g.ok+g.wrong)*100):0;return `<div class="chartrow"><span>${esc(n)}</span><div class="chartbar ok"><i style="width:${p}%"></i></div><b>${p}%</b></div>`}).join('')||'<div class="notice">Resolva questões para gerar gráficos.</div>'}`)}
function simulator(){modal('Gerador de simulado',`<div class="field"><label>Tipo</label><select id="etype"><option value="both">Gerais e da banca</option><option value="general">Somente gerais</option><option value="board">Somente da banca</option></select></div>${C().disciplines.map(d=>`<div class="row"><label>${esc(d.name)}</label><input type="number" min="0" value="0" data-d="${d.id}" style="width:90px"></div>`).join('')}<div class="tabs"><button class="btn" onclick="makeSim(false)">Resolver on-line</button><button class="btn gray" onclick="makeSim(true)">Gerar PDF</button></div>`)}function makeSim(pdf){let type=document.getElementById('etype').value,all=allQ().filter(x=>type==='both'||x.a===type),sel=[];document.querySelectorAll('[data-d]').forEach(i=>{let pool=all.filter(x=>x.d.id===i.dataset.d).sort(()=>Math.random()-.5);sel.push(...pool.slice(0,+i.value||0))});if(!sel.length)return alert('Escolha quantidades e cadastre questões.');if(!pdf){ex={qs:sel.map(x=>x.q),pos:0,ans:Array(sel.length).fill(null),source:null};showEx()}else modal('Prova simulada',`<div class="no-print notice">Use Imprimir e escolha Salvar como PDF.</div><button class="no-print btn" onclick="print()">Imprimir / Salvar PDF</button><div class="examhead"><h2>${esc(C().name)} · SIMULADO</h2><p>Nome: _________________________ Data: ___/___/_____</p></div>${sel.map((x,i)=>`<div class="question"><b>${i+1}. ${esc(x.q.text)}</b>${x.q.alts.map((a,j)=>`<p>○ ${String.fromCharCode(65+j)}) ${esc(a)}</p>`).join('')}</div>`).join('')}<div class="pagebreak"><h2>GABARITO</h2>${sel.map((x,i)=>`${i+1}-${String.fromCharCode(65+x.q.correct)}`).join(' | ')}</div>`)}
function exportIndex(){save();let html='<!doctype html>'+String.fromCharCode(10)+document.documentElement.outerHTML;let stamp=Date.now();let replacement='const SEED='+JSON.stringify(db)+",KEY='portal-compartilhado-"+stamp+"'";html=html.replace(/const SEED=.*?,KEY='portal-link-v1'/s,replacement);let blob=new Blob([html],{type:'text/html;charset=utf-8'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='index-atualizado.html';a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000)}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeM()});render();
</script></body></html>
